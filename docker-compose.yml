# ============================================================================
# CDSS Docker Compose — Single Server Deployment
# ============================================================================
# Prerequisites:
#   - NVIDIA GPU with drivers installed (for vLLM)
#   - nvidia-container-toolkit installed
#   - At least 100GB disk for models + data
#   - Minimum 32GB RAM for Postgres + Neo4j
#   - GPU: see notes per vLLM service
# ============================================================================

version: "3.9"

services:

  # ---------- PostgreSQL + pgvector ----------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cdss-postgres
    environment:
      POSTGRES_DB: cdss
      POSTGRES_USER: cdss_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cdss_secure_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schemas/postgres_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    shm_size: "512mb"
    command: >
      postgres
        -c shared_buffers=2GB
        -c effective_cache_size=6GB
        -c work_mem=256MB
        -c maintenance_work_mem=512MB
        -c max_connections=100
        -c shared_preload_libraries='vector'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdss_app -d cdss"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- Neo4j ----------
  neo4j:
    image: neo4j:5-community
    container_name: cdss-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-cdss_neo4j_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: "1G"
      NEO4J_server_memory_heap_max__size: "2G"
      NEO4J_server_memory_pagecache_size: "1G"
    ports:
      - "7474:7474"   # HTTP (browser)
      - "7687:7687"   # Bolt
    volumes:
      - neo4jdata:/data
      - ./schemas/neo4j_schema.cypher:/var/lib/neo4j/import/schema.cypher
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ---------- vLLM: Embedding Model ----------
  # BAAI/bge-large-en-v1.5 — 335M params, runs on CPU or small GPU
  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: cdss-embedding
    ports:
      - "8081:80"
    volumes:
      - model_cache:/data
    environment:
      - MODEL_ID=BAAI/bge-large-en-v1.5
    command: --model-id BAAI/bge-large-en-v1.5 --port 80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ---------- vLLM: Composition Model (query-time, real-time) ----------
  # Qwen2.5-7B-Instruct — runs on 1× RTX 4090 / A6000 / A100
  # This is the model that formats SQL/graph results into natural language
  vllm-composition:
    image: vllm/vllm-openai:latest
    container_name: cdss-vllm-composition
    ports:
      - "8082:8000"
    volumes:
      - model_cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    command: >
      --model Qwen/Qwen2.5-7B-Instruct
      --dtype auto
      --max-model-len 8192
      --gpu-memory-utilization 0.85
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ---------- vLLM: Extraction Model (batch ingestion, NOT real-time) ----------
  # Qwen2.5-72B-Instruct-AWQ — requires 2× A100 80GB
  # Only needed during Phase 3 (Pass 2). Can be stopped after ingestion.
  #
  # ALTERNATIVE for smaller GPU budget:
  #   Replace with Qwen2.5-32B-Instruct-AWQ on 1× A100 80GB
  #   Change --model to Qwen/Qwen2.5-32B-Instruct-AWQ
  #   Change --tensor-parallel-size to 1
  #
  # Uncomment when running Phase 3:
  #
  # vllm-extraction:
  #   image: vllm/vllm-openai:latest
  #   container_name: cdss-vllm-extraction
  #   ports:
  #     - "8083:8000"
  #   volumes:
  #     - model_cache:/root/.cache/huggingface
  #   environment:
  #     - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
  #   command: >
  #     --model Qwen/Qwen2.5-72B-Instruct-AWQ
  #     --quantization awq
  #     --dtype auto
  #     --max-model-len 8192
  #     --tensor-parallel-size 2
  #     --gpu-memory-utilization 0.90
  #     --port 8000
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 2
  #             capabilities: [gpu]
  #   restart: unless-stopped

  # ---------- FastAPI Application ----------
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cdss-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://cdss_app:${POSTGRES_PASSWORD:-cdss_secure_password}@postgres:5432/cdss
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-cdss_neo4j_password}
      - EMBEDDING_URL=http://embedding:80
      - VLLM_COMPOSITION_URL=http://vllm-composition:8000
      - VLLM_EXTRACTION_URL=http://vllm-extraction:8000
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      embedding:
        condition: service_healthy
      vllm-composition:
        condition: service_healthy
    volumes:
      - ./data:/app/data              # Raw JSON files for ingestion
      - ./logs:/app/logs              # Audit logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  pgdata:
  neo4jdata:
  model_cache: